spring.application.name=devdevgo-jobs-service
server.port=${PORT:8080}

spring.main.web-application-type=reactive

# ── Adzuna ────────────────────────────────────────────────────────────────────
adzuna.base-url=https://api.adzuna.com/v1/api
adzuna.app-id=${ADZUNA_APP_ID}
adzuna.app-key=${ADZUNA_APP_KEY}
adzuna.country=in

# Rate-limit budget:
#   Free tier: 250 req/day, 25 req/min
#   Batch size 8 × 24 runs/day = 192 calls/day  ← safe (77% of daily quota)
#   Each call fetches 10 results → 80 new listings written to Firestore/hour
adzuna.default-results-per-page=10

# ── Firebase ──────────────────────────────────────────────────────────────────
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase/firebase-key.json}
firebase.project-id=${FIREBASE_PROJECT_ID:devdevgo-jobservice}
firebase.collection-name=${FIREBASE_COLLECTION_NAME:job_listings}
firebase.metadata-collection-name=${FIREBASE_METADATA_COLLECTION_NAME:system_metadata}

# ── Elasticsearch (optional) ──────────────────────────────────────────────────
jobs.elasticsearch.enabled=${JOBS_ELASTICSEARCH_ENABLED:false}
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}}
spring.elasticsearch.username=${ELASTICSEARCH_USERNAME:${SPRING_ELASTICSEARCH_USERNAME:}}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:${SPRING_ELASTICSEARCH_PASSWORD:}}

# ── Sync scheduler ────────────────────────────────────────────────────────────
jobs.sync.enabled=${JOBS_SYNC_ENABLED:true}

# Cron: run at minute 0 of every hour  (0 0 * * * * = every hour on the dot)
# Override via env: JOBS_SYNC_CRON="0 0 */2 * * *"  (every 2 hours)
jobs.sync.cron=${JOBS_SYNC_CRON:0 0 * * * *}

# 8 profiles per batch → 8 Adzuna API calls per run → 192/day (safe under 250)
jobs.sync.batch-size=${JOBS_SYNC_BATCH_SIZE:8}

# Purge jobs older than this many days (keeps Firestore lean)
jobs.sync.purge-after-days=${JOBS_SYNC_PURGE_AFTER_DAYS:14}

jobs.sync.min-interval=${JOBS_SYNC_MIN_INTERVAL:PT1H}

# ── Search ────────────────────────────────────────────────────────────────────
# Max listings loaded from Firestore per search query
jobs.search.recent-limit=${JOBS_SEARCH_RECENT_LIMIT:1000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.devdevgo.jobs=INFO
